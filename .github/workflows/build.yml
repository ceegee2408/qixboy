name: Build Arduboy HEX

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - uses: actions/checkout@v4

      # Step 2: Install PlatformIO
      - name: Install PlatformIO
        run: |
          python3 -m pip install --upgrade pip
          pip install platformio

      # Step 3: Build project
      - name: Build
        run: |
          pio run

      # Step 4: Copy HEX to docs/qixboy.hex
      - name: Export HEX
        run: |
          mkdir -p docs
          cp .pio/build/arduboy/firmware.hex docs/qixboy.hex

      # Step 5: Commit HEX
      - name: Commit HEX
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/qixboy.hex
          git commit -m "Auto-update qixboy.hex" || echo "No changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:master
