name: Build Arduboy HEX

on:
  push:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: |
          python3 -m pip install --upgrade pip
          pip install platformio

      - name: Build
        run: |
          pio run

      - name: Export HEX
        run: |
          mkdir -p docs
          cp .pio/build/arduboy/firmware.hex docs/qixboy.hex

      - name: Commit HEX
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/qixboy.hex
          git commit -m "Auto-update qixboy.hex" || echo "No changes"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" HEAD:"${{ github.ref_name }}"